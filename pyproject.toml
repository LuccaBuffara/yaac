[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "helena-code"
version = "0.1.0"
description = "Helena Code - An AI coding assistant powered by Pydantic AI"
requires-python = ">=3.11"
dependencies = [
    "pydantic-ai[anthropic]>=0.0.20",
    "rich>=13.0.0",
    "prompt_toolkit>=3.0.0",
    "pydantic>=2.0.0",
]

[project.scripts]
helena = "helena.main:main"

[tool.hatch.build.targets.wheel]
packages = ["helena"]
